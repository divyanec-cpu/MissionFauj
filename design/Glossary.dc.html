<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #12130e; }
    a { color: #d99a3d; }
    a:hover { color: #ecc27a; }
  </style>
</helmet>

<div style="--bg-deep:#12130e; --bg-panel:#1b1d15; --border:#3a3d2e; --khaki:#c9bd97; --text:#ece7d4; --text-muted:#9b9a86; --amber:#d99a3d; font-family:'IBM Plex Sans',sans-serif; background:var(--bg-deep); min-height:100vh; color:var(--text);">

  <div style="display:flex; align-items:baseline; gap:14px; padding:22px clamp(20px,5vw,56px); border-bottom:1px solid var(--border); flex-wrap:wrap;">
    <div style="font-family:'Rajdhani',sans-serif; font-weight:700; font-size:22px; letter-spacing:2px;">MISSION<span style="color:var(--amber);">FAUJ</span></div>
    <div style="font-size:11px; letter-spacing:1.5px; color:var(--text-muted); text-transform:uppercase;">Glossary</div>
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap; padding:14px clamp(20px,5vw,56px) 0;">
    <a href="Onboarding Eligibility.dc.html" style="font-size:11px; color:var(--text-muted); text-decoration:none; border:1px solid var(--border); padding:5px 10px;">Eligibility</a>
    <a href="Written Exam Prep.dc.html" style="font-size:11px; color:var(--text-muted); text-decoration:none; border:1px solid var(--border); padding:5px 10px;">Written Prep</a>
    <a href="SSB Training.dc.html" style="font-size:11px; color:var(--text-muted); text-decoration:none; border:1px solid var(--border); padding:5px 10px;">SSB Training</a>
    <a href="Help Center.dc.html" style="font-size:11px; color:var(--text-muted); text-decoration:none; border:1px solid var(--border); padding:5px 10px;">Help Centre</a>
  </div>

  <div style="padding:clamp(24px,4vw,48px) clamp(20px,5vw,56px) 64px; max-width:900px;">
    <div style="font-family:'Rajdhani',sans-serif; font-weight:700; font-size:clamp(26px,4vw,34px); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px;">Terms &amp; Abbreviations</div>
    <p style="color:var(--text-muted); font-size:14px; margin:0 0 28px;">Every short form used across MissionFauj, spelled out in full.</p>

    <sc-for list="{{ groups }}" as="g" hint-placeholder-count="4">
      <div style="margin-bottom:30px;">
        <div style="font-family:'Rajdhani',sans-serif; font-weight:700; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:var(--amber); margin-bottom:12px;">{{ g.title }}</div>
        <div style="display:flex; flex-direction:column; gap:0;">
          <sc-for list="{{ g.terms }}" as="t" hint-placeholder-count="4">
            <div style="display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--border); align-items:baseline;">
              <div style="font-family:'Rajdhani',sans-serif; font-weight:700; font-size:15px; color:var(--khaki); min-width:110px; flex:none;">{{ t.abbr }}</div>
              <div style="font-size:13px; color:var(--text);">{{ t.full }}</div>
            </div>
          </sc-for>
        </div>
      </div>
    </sc-for>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      groups: [
        {
          title: 'Entry Schemes',
          terms: [
            { abbr: 'NDA', full: 'National Defence Academy' },
            { abbr: 'NA', full: 'Naval Academy' },
            { abbr: 'CDS', full: 'Combined Defence Services' },
            { abbr: 'IMA', full: 'Indian Military Academy' },
            { abbr: 'INA', full: 'Indian Naval Academy' },
            { abbr: 'AFA', full: 'Air Force Academy' },
            { abbr: 'OTA', full: 'Officers Training Academy' },
            { abbr: 'AFCAT', full: 'Air Force Common Admission Test' },
            { abbr: 'EKT', full: 'Engineering Knowledge Test' },
            { abbr: 'TES', full: 'Technical Entry Scheme' },
            { abbr: 'TGC', full: 'Technical Graduate Course' },
            { abbr: 'SSC', full: 'Short Service Commission' },
            { abbr: 'NCC', full: 'National Cadet Corps' },
            { abbr: 'UES', full: 'University Entry Scheme' },
            { abbr: 'JAG', full: 'Judge Advocate General' },
            { abbr: 'ACC', full: 'Army Cadet College' },
            { abbr: 'TA', full: 'Territorial Army' }
          ]
        },
        {
          title: 'SSB & Psychology',
          terms: [
            { abbr: 'SSB', full: 'Services Selection Board' },
            { abbr: 'TAT', full: 'Thematic Apperception Test' },
            { abbr: 'WAT', full: 'Word Association Test' },
            { abbr: 'SRT', full: 'Situation Reaction Test' },
            { abbr: 'SD', full: 'Self Description' },
            { abbr: 'PPDT', full: 'Picture Perception & Discussion Test' },
            { abbr: 'GTO', full: 'Group Testing Officer' },
            { abbr: 'GD', full: 'Group Discussion' },
            { abbr: 'IO', full: 'Interviewing Officer' },
            { abbr: 'PIQ', full: 'Personal Information Questionnaire' },
            { abbr: 'OLQ', full: 'Officer-Like Qualities' }
          ]
        },
        {
          title: 'Written Exam',
          terms: [
            { abbr: 'GAT', full: 'General Ability Test' },
            { abbr: 'GK', full: 'General Knowledge' },
            { abbr: 'PCM', full: 'Physics, Chemistry, Mathematics' }
          ]
        },
        {
          title: 'General',
          terms: [
            { abbr: 'UPSC', full: 'Union Public Service Commission' },
            { abbr: 'DRDO', full: 'Defence Research and Development Organisation' },
            { abbr: 'CDS (Staff)', full: 'Chief of Defence Staff' }
          ]
        }
      ]
    };
  }
}

</script>
</body>
</html>
